<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QL Đào Tạo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        .sidebar-active { background-color: #1e40af; color: white; }
    </style>
</head>
<body class="bg-gray-100 flex h-screen">
    <!-- Sidebar -->
    <div class="w-72 bg-blue-700 text-white flex flex-col">
        <div class="p-6 text-2xl font-bold border-b border-blue-600">QL Đào Tạo</div>
        <nav class="flex-1 py-6">
            <a onclick="switchSection(0)" id="menu-0" class="sidebar-active flex items-center px-6 py-4 hover:bg-blue-600 cursor-pointer">
                <i class="fas fa-graduation-cap mr-3"></i> Ngành Đào Tạo
            </a>
            <a onclick="switchSection(1)" id="menu-1" class="flex items-center px-6 py-4 hover:bg-blue-600 cursor-pointer">
                <i class="fas fa-layer-group mr-3"></i> Chương Trình Đào Tạo
            </a>
            <a onclick="switchSection(2)" id="menu-2" class="flex items-center px-6 py-4 hover:bg-blue-600 cursor-pointer">
                <i class="fas fa-book mr-3"></i> Môn Học
            </a>
            <a onclick="switchSection(3)" id="menu-3" class="flex items-center px-6 py-4 hover:bg-blue-600 cursor-pointer">
                <i class="fas fa-list-check mr-3"></i> Học Phần CTĐT
            </a>
        </nav>
    </div>

    <!-- Main Content -->
    <div class="flex-1 overflow-auto">
        <div class="p-8">
            <h1 class="text-3xl font-bold text-gray-800" id="pageTitle">Chương Trình Đào Tạo</h1>
            <p class="text-gray-600" id="pageDesc">Quản lý chương trình đào tạo</p>

            <!-- Bộ lọc + Thao tác -->
            <div class="bg-white p-6 rounded-2xl shadow mt-8">
                <div class="flex flex-wrap gap-4 items-end">
                    <div>
                        <label class="block text-sm text-gray-600 mb-1">Tìm kiếm</label>
                        <input id="searchInput" placeholder="Mã hoặc tên..." 
                               class="w-80 px-4 py-3 border border-gray-300 rounded-xl focus:border-blue-500">
                    </div>
                    <div>
                        <label class="block text-sm text-gray-600 mb-1">Trạng thái</label>
                        <select class="px-4 py-3 border border-gray-300 rounded-xl">
                            <option>Tất cả</option>
                            <option>Hoạt động</option>
                            <option>Không hoạt động</option>
                        </select>
                    </div>
                    <button onclick="searchData()" 
                            class="bg-blue-600 text-white px-8 py-3 rounded-xl hover:bg-blue-700">
                        <i class="fas fa-search"></i> Tìm
                    </button>
                    <button onclick="showCreateModal()" 
                            class="bg-green-600 text-white px-6 py-3 rounded-xl flex items-center gap-2 hover:bg-green-700 ml-auto">
                        <i class="fas fa-plus"></i> Thêm Mới
                    </button>
                </div>
            </div>

            <!-- Bảng dữ liệu -->
            <div class="bg-white rounded-2xl shadow mt-6 overflow-hidden">
                <table class="w-full" id="dataTable">
                    <thead class="bg-gray-50" id="tableHeader"></thead>
                    <tbody id="tableBody" class="divide-y"></tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Modal -->
    <div id="modal" class="hidden fixed inset-0 bg-black/60 flex items-center justify-center z-50">
        <div class="bg-white rounded-3xl w-full max-w-lg mx-4">
            <div class="px-8 py-5 border-b flex justify-between items-center">
                <h2 class="text-xl font-semibold" id="modalTitle">Thêm Mới</h2>
                <button onclick="closeModal()" class="text-3xl text-gray-400 hover:text-gray-600">×</button>
            </div>
            <div class="p-8" id="modalContent"></div>
        </div>
    </div>

    <script>
        let currentSection = 1;
        const baseUrl = "http://localhost:8080/api";

        const sections = [
            {api: "/majors", title: "Ngành Đào Tạo"},
            {api: "/training-programs", title: "Chương Trình Đào Tạo"},
            {api: "/courses", title: "Môn Học"},
            {api: "/training-program-courses", title: "Học Phần CTĐT"}
        ];

        async function loadData(keyword = '') {
            const sec = sections[currentSection];
            try {
                const res = await fetch(`${baseUrl}${sec.api}?page=0&size=50${keyword ? '&keyword='+encodeURIComponent(keyword) : ''}`);
                const json = await res.json();
                const items = json.data?.content || json.data || [];
                renderTable(items);
            } catch (e) { console.error(e); }
        }

        function renderTable(items) {
            let header = `<tr class="bg-gray-50"><th class="px-6 py-4 text-left">Mã</th><th class="px-6 py-4 text-left">Tên</th><th class="px-6 py-4 text-left">Thông tin</th><th class="px-6 py-4 text-center">Thao tác</th></tr>`;
            document.getElementById("tableHeader").innerHTML = header;

            let body = '';
            items.forEach(item => {
                body += `
                <tr class="hover:bg-gray-50">
                    <td class="px-6 py-4 font-medium">${item.code || ''}</td>
                    <td class="px-6 py-4">${item.name || item.courseName || ''}</td>
                    <td class="px-6 py-4 text-gray-600">${item.description || item.credits || ''}</td>
                    <td class="px-6 py-4 text-center">
                        <button onclick="editItem('${item.id}')" class="bg-amber-500 text-white px-4 py-1 rounded-lg text-sm mr-2">Sửa</button>
                        <button onclick="deleteItem('${item.id}')" class="bg-red-500 text-white px-4 py-1 rounded-lg text-sm">Xóa</button>
                    </td>
                </tr>`;
            });
            document.getElementById("tableBody").innerHTML = body;
        }

        function switchSection(n) {
            currentSection = n;
            document.querySelectorAll('nav a').forEach((el,i) => el.classList.toggle('sidebar-active', i===n));
            document.getElementById("pageTitle").textContent = sections[n].title;
            loadData();
        }

        function searchData() {
            loadData(document.getElementById("searchInput").value.trim());
        }

        function showCreateModal() {
            document.getElementById("modalTitle").textContent = `Thêm ${sections[currentSection].title}`;
            document.getElementById("modalContent").innerHTML = `
                <div class="space-y-5">
                    <input id="code" placeholder="Mã" class="w-full border rounded-xl px-4 py-3">
                    <input id="name" placeholder="Tên đầy đủ" class="w-full border rounded-xl px-4 py-3">
                    <textarea id="desc" placeholder="Mô tả / Thông tin thêm" class="w-full border rounded-xl px-4 py-3 h-32"></textarea>
                </div>
                <div class="flex justify-end gap-4 mt-8">
                    <button onclick="closeModal()" class="px-6 py-3 border rounded-xl">Hủy</button>
                    <button onclick="saveItem()" class="px-6 py-3 bg-blue-600 text-white rounded-xl">Lưu</button>
                </div>`;
            document.getElementById("modal").classList.remove("hidden");
        }

        async function editItem(id) {
            document.getElementById("modalTitle").textContent = "Sửa Thông Tin";
            document.getElementById("modalContent").innerHTML = `<p class="text-center py-8">Đang tải...</p>`;
            document.getElementById("modal").classList.remove("hidden");

            const res = await fetch(`${baseUrl}${sections[currentSection].api}/${id}`);
            const json = await res.json();
            const item = json.data;

            document.getElementById("modalContent").innerHTML = `
                <div class="space-y-5">
                    <input id="code" value="${item.code||''}" class="w-full border rounded-xl px-4 py-3">
                    <input id="name" value="${item.name||item.courseName||''}" class="w-full border rounded-xl px-4 py-3">
                    <textarea id="desc" class="w-full border rounded-xl px-4 py-3 h-32">${item.description||''}</textarea>
                </div>
                <div class="flex justify-end gap-4 mt-8">
                    <button onclick="closeModal()" class="px-6 py-3 border rounded-xl">Hủy</button>
                    <button onclick="saveItem('${id}')" class="px-6 py-3 bg-blue-600 text-white rounded-xl">Lưu thay đổi</button>
                </div>`;
        }

        function saveItem(id = null) {
            alert(id ? "Cập nhật thành công!" : "Thêm mới thành công!");
            closeModal();
            loadData();
        }

        function deleteItem(id) {
            if (confirm("Xác nhận xóa?")) {
                alert("Đã xóa thành công!");
                loadData();
            }
        }

        function closeModal() {
            document.getElementById("modal").classList.add("hidden");
        }

        window.onload = () => loadData();
    </script>
</body>
</html>
